services:

  # ── Base de datos ─────────────────────────────────────
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: paqtrack_db
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Node.js ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paqtrack_api
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend vanilla HTML/JS  →  localhost:5173 ───────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paqtrack_front_vanilla
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ── Frontend Angular          →  localhost:4200 ───────
  frontend-angular:
    build:
      context: ./frontend-angular
      dockerfile: Dockerfile
    container_name: paqtrack_front_angular
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
