services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app_node
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: app_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paquetes_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_front
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  mysql_data:
